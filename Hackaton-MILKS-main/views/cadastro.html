<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPrev - Cadastro</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body style="justify-content: center; align-items: center;">
    <div class="card" style="width: 100%; max-width: 450px;">
        <div class="logo-container" style="justify-content: center; margin-bottom: 1.5rem;">
            <img src="/logo.png" alt="VitaPrev Logo">
            <h1>VitaPrev</h1>
        </div>
        <h3 style="text-align: center; margin-bottom: 1rem; color: var(--dark-green);">Plataforma de Saúde Preventiva</h3>
        <form action="/api/cadastro" method="POST">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="nome" required placeholder="Ex: João Silva">
            </div>
            <div class="form-group">
                <label>Idade</label>
                <input type="number" name="idade" required placeholder="Ex: 34">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" required placeholder="email@provedor.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit" class="btn-secondary">Criar Minha Conta</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Já possui cadastro? <a href="/entrar" style="color: var(--primary-blue); font-weight: bold;">Faça Login</a>
        </p>
    </div>
</body>
</html>
