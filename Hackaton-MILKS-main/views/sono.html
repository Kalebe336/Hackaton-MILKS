<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPrev - Controle de Sono</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/logo.png" alt="VitaPrev Logo">
            <h1>VitaPrev</h1>
        </div>
        <nav>
            <a href="/perfil">Perfil</a>
            <a href="/transcricao">Transcrever Exames</a>
            <a href="/nutricao">Nutrição</a>
            <a href="/sono" class="active">Sono</a>
            <a href="/api/sair" style="color: var(--alert-red);">Sair</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="grid-2">
            <div class="card">
                <h2>Registrar Noite de Sono</h2>
                <form action="/api/sono/adicionar" method="POST">
                    <div class="form-group">
                        <label>Quantas horas você dormiu na última noite?</label>
                        <input type="number" step="0.5" name="horas" placeholder="Ex: 7.5" required>
                    </div>
                    <button type="submit" style="background-color: var(--dark-green);">Registrar</button>
                </form>
            </div>

            <div class="card card-blue">
                <h2>Gráfico e Análise de Consistência</h2>
                <div id="historicoSono">
                    </div>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/usuario-atual')
            .then(res => res.json())
            .then(user => {
                const container = document.getElementById('historicoSono');
                if(user.sono.length === 0) {
                    container.innerHTML = '<p style="color:#777;">Nenhum registro de sono efetuado.</p>';
                    return;
                }

                user.sono.slice(-4).forEach(s => { // Mostra os últimos 4 registros
                    let badgeClass = 'badge-moderado';
                    if(s.status === 'Bom') badgeClass = 'badge-bom';
                    if(s.status === 'Baixo') badgeClass = 'badge-bajo';
                    
                    // Cálculo de porcentagem da barra baseado em um teto ideal de 8h dormidas
                    let pctSono = Math.min((s.horas / 8) * 100, 100);

                    container.innerHTML += `
                        <div style="margin-bottom: 1.2rem;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                <span><strong>Data:</strong> ${s.data} - ${s.horas} horas</span>
                                <span class="badge ${badgeClass}">${s.status}</span>
                            </div>
                            <div class="chart-bar-container">
                                <div class="chart-bar-fill" style="width: ${pctSono}%; background-color: var(--medium-green);"></div>
                            </div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
