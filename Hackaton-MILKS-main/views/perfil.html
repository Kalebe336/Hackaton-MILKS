<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPrev - Meu Perfil</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/logo.png" alt="VitaPrev Logo">
            <h1>VitaPrev</h1>
        </div>
        <nav>
            <a href="/perfil" class="active">Perfil</a>
            <a href="/transcricao">Transcrever Exames</a>
            <a href="/nutricao">Nutrição</a>
            <a href="/sono">Sono</a>
            <a href="/api/sair" style="color: var(--alert-red);">Sair</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="grid-2">
            <div class="card card-blue">
                <h2>Seus Dados Cadastrais</h2>
                <form action="/api/perfil/editar" method="POST">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="editNome" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label>Idade</label>
                        <input type="number" id="editIdade" name="idade" required>
                    </div>
                    <button type="submit">Salvar Alterações</button>
                </form>
                <hr style="margin: 2rem 0; border: none; border-top: 1px solid #DDD;">
                <button class="btn-danger" onclick="deletarConta()">Apagar Minha Conta Permanentemente</button>
            </div>

            <div class="card">
                <h2>Galeria de Exames Arquivados</h2>
                <div id="galeriaExames" class="grid-2" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                    </div>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/usuario-atual')
            .then(res => res.json())
            .then(user => {
                document.getElementById('editNome').value = user.nome;
                document.getElementById('editIdade').value = user.idade;
                
                const galeria = document.getElementById('galeriaExames');
                if(user.exames.length === 0) {
                    galeria.innerHTML = '<p style="grid-column: span 2; color: #888;">Nenhuma foto de exame salva ainda.</p>';
                }
                user.exames.forEach(ex => {
                    if(ex.foto) {
                        galeria.innerHTML += `
                            <div style="background:#FFF; padding:5px; border:1px solid #DDD; border-radius:8px; text-align:center;">
                                <img src="${ex.foto}" style="width:100%; height:120px; object-fit:cover; border-radius:4px;">
                                <small style="display:block; margin-top:5px; font-weight:bold;">${ex.tipo}</small>
                                <small style="color:#666;">${ex.data}</small>
                            </div>
                        `;
                    }
                });
            });

        function deletarConta() {
            if(confirm("Tem certeza absoluta que deseja excluir seu perfil? Esta ação não pode ser desfeita.")) {
                fetch('/api/perfil/deletar', { method: 'POST' })
                    .then(() => window.location.href = '/cadastro');
            }
        }
    </script>
</body>
</html>
