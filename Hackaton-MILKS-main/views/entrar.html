<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPrev - Entrar</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body style="justify-content: center; align-items: center;">
    <div class="card card-blue" style="width: 100%; max-width: 400px;">
        <div class="logo-container" style="justify-content: center; margin-bottom: 1.5rem;">
            <img src="/logo.png" alt="VitaPrev Logo">
            <h1>VitaPrev</h1>
        </div>
        <form action="/api/entrar" method="POST">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" required placeholder="seuemail@exemplo.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Acessar Conta</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Não tem uma conta? <a href="/cadastro" style="color: var(--dark-green); font-weight: bold;">Cadastre-se</a>
        </p>
    </div>
</body>
</html>
