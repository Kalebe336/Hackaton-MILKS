<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPreve - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* RESET DE ESTILOS BASES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; /* Fundo totalmente limpo da folha */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        /* CONTAINER DA TELA INTEIRA (Expandido na horizontal) */
        .cadastro-container {
            width: 100%;
            max-width: 1100px; /* Garante que preencha a tela de forma elegante e ampla */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BADGE/BOTÃO DE TOPO: INFORMAÇÕES PESSOAIS */
        .section-badge {
            font-family: 'Comfortaa', cursive;
            font-size: 24px;
            font-weight: 500;
            color: #1e293b;
            padding: 12px 60px;
            border: 2px solid #1e293b;
            border-radius: 14px;
            background-color: #ffffff;
            margin-bottom: 40px;
            text-align: center;
        }

        /* FORMULÁRIO DE LARGURA TOTAL */
        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* GRUPO DE CAMPOS TEXTO INTEIROS (Nome, Email, Senhas) */
        .input-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .input-block label {
            font-family: 'Comfortaa', cursive;
            font-size: 18px;
            color: #1e293b;
            text-align: left;
            padding-left: 4px;
        }

        .input-block input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #1e293b; /* Borda idêntica ao traço do desenho */
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            background-color: #ffffff;
            transition: all 0.2s ease;
        }

        .input-block input:focus {
            box-shadow: 0 0 0 4px rgba(30, 41, 59, 0.08); /* Destaque sutil ao focar */
        }

        /* LINHA DE CAMPOS DUPLOS (Data de Nascimento + Gênero) */
        .flex-row-group {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
            margin-top: 10px;
            flex-wrap: wrap; /* Responsivo para telas menores */
        }

        .sub-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            min-width: 300px;
        }

        .sub-column .title-label {
            font-family: 'Comfortaa', cursive;
            font-size: 18px;
            color: #1e293b;
            text-align: center;
            margin-bottom: 4px;
        }

        /* BLOCOS DA DATA (3 inputs separados) */
        .date-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .date-inputs input {
            width: 80px;
            padding: 14px;
            border: 2px solid #1e293b;
            border-radius: 14px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        /* SELEÇÃO DE GÊNERO (Botões lado a lado) */
        .gender-selection {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .gender-option {
            position: relative;
            flex: 1;
            max-width: 130px;
        }

        .gender-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .gender-label {
            display: block;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            text-align: center;
            padding: 14px;
            border: 2px solid #1e293b;
            border-radius: 14px;
            cursor: pointer;
            background-color: #ffffff;
            transition: all 0.2s ease;
            user-select: none;
        }

        /* Efeito de quando o botão de gênero estiver selecionado */
        .gender-option input[type="radio"]:checked + .gender-label {
            background-color: #1e293b;
            color: #ffffff;
        }

        /* LINHA DE PESO E ALTURA */
        .measurements-row {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .measure-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .measure-box label {
            font-family: 'Comfortaa', cursive;
            font-size: 18px;
            color: #1e293b;
        }

        /* Input especial com sufixo interno (kg / cm) */
        .measure-input-wrapper {
            position: relative;
            width: 180px;
        }

        .measure-input-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 16px; /* Abre espaço na direita para o texto fixo */
            border: 2px solid #1e293b;
            border-radius: 14px;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .measure-input-wrapper .suffix {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            color: #64748b;
            pointer-events: none; /* Garante que clicar no "kg" ainda foque o input */
        }

        /* BOTÃO CADASTRAR (Centralizado na parte inferior) */
        .submit-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .btn-cadastrar {
            font-family: 'Comfortaa', cursive;
            font-size: 18px;
            color: #1e293b;
            background-color: #ffffff;
            padding: 14px 80px;
            border: 2px solid #1e293b;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-cadastrar:hover {
            background-color: #1e293b;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="cadastro-container">
        
        <div class="section-badge">informações pessoais</div>
        
        <form action="#" method="POST">
            
            <div class="input-block">
                <label for="nome">nome completo</label>
                <input type="text" id="nome" required>
            </div>

            <div class="input-block">
                <label for="contato">celular ou email</label>
                <input type="text" id="contato" required>
            </div>

            <div class="input-block">
                <label for="senha">senha</label>
                <input type="password" id="senha" required>
            </div>

            <div class="input-block">
                <label for="repita-senha">repita senha</label>
                <input type="password" id="repita-senha" required>
            </div>

            <div class="flex-row-group">
                
                <div class="sub-column">
                    <div class="title-label">data de nascimento</div>
                    <div class="date-inputs">
                        <input type="text" placeholder="DD" maxlength="2" required>
                        <input type="text" placeholder="MM" maxlength="2" required>
                        <input type="text" placeholder="AAAA" maxlength="4" required>
                    </div>
                </div>

                <div class="sub-column">
                    <div class="title-label">genero</div>
                    <div class="gender-selection">
                        <div class="gender-option">
                            <input type="radio" name="gender" id="fem" value="feminino" required>
                            <label for="fem" class="gender-label">fem</label>
                        </div>
                        <div class="gender-option">
                            <input type="radio" name="gender" id="masc" value="masculino">
                            <label for="masc" class="gender-label">masc</label>
                        </div>
                    </div>
                </div>

            </div>

            <div class="measurements-row">
                
                <div class="measure-box">
                    <label for="peso">peso</label>
                    <div class="measure-input-wrapper">
                        <input type="number" id="peso" step="0.1" required>
                        <span class="suffix">kg</span>
                    </div>
                </div>

                <div class="measure-box">
                    <label for="altura">altura</label>
                    <div class="measure-input-wrapper">
                        <input type="number" id="altura" required>
                        <span class="suffix">cm</span>
                    </div>
                </div>

            </div>

            <div class="submit-container">
                <button type="submit" class="btn-cadastrar">cadastrar</button>
            </div>

        </form>

    </div>

</body>
</html>
