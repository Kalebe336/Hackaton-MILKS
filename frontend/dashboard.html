<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPreve - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* RESET DE ESTILOS BASES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; /* Mantendo o fundo branco limpo dos seus esboços */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* CONTAINER PRINCIPAL DO DASHBOARD */
        .dashboard-container {
            width: 100%;
            max-width: 1100px; /* Mesma largura da página de cadastro para manter consistência */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px; /* Espaçamento generoso entre o título e os cards */
        }

        /* TÍTULO SUPERIOR */
        .main-title {
            font-family: 'Comfortaa', cursive;
            font-size: 42px;
            font-weight: 500;
            color: #1e293b;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* GRADE DOS TRÊS CARDS LADO A LADO */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Divide o espaço igualmente em 3 colunas */
            gap: 40px; /* Espaço entre os cards verticais */
            width: 100%;
        }

        /* O CARD VERTICAL (Idêntico às proporções do seu desenho) */
        .card {
            background-color: #ffffff;
            border: 2px solid #1e293b; /* Traço forte e bem definido à mão livre */
            border-radius: 28px; /* Cantos bem arredondados do esboço */
            aspect-ratio: 4 / 5; /* Força o formato vertical perfeito (mais alto do que largo) */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            text-decoration: none; /* Remove sublinhado padrão caso vire um link <a> */
            transition: all 0.25s ease;
            padding: 30px;
        }

        /* ÍCONES INTERNOS DOS CARDS */
        .card-icon {
            font-size: 48px;
            color: #1e293b;
            transition: transform 0.25s ease;
        }

        /* TEXTO DO CARD */
        .card-title {
            font-family: 'Comfortaa', cursive;
            font-size: 24px;
            font-weight: 500;
            color: #1e293b;
            text-align: center;
        }

        /* EFEITO AO PASSAR O MOUSE (Interatividade moderna para o usuário) */
        .card:hover {
            background-color: #1e293b;
            box-shadow: 0 12px 30px rgba(30, 41, 59, 0.15);
            transform: translateY(-5px); /* Dá uma leve levantada no card */
        }

        /* Inverte a cor do texto e ícone quando passa o mouse por cima do card */
        .card:hover .card-title,
        .card:hover .card-icon {
            color: #ffffff;
        }

        .card:hover .card-icon {
            transform: scale(1.1); /* Dá um leve zoom no ícone */
        }

        /* RESPONSIVIDADE PARA CELULARES */
        @media (max-width: 850px) {
            .cards-grid {
                grid-template-columns: 1fr; /* Em telas pequenas, os cards ficam um embaixo do outro */
                gap: 24px;
                max-width: 360px; /* Evita que o card estique demais no celular */
                margin: 0 auto;
            }
            
            .main-title {
                font-size: 32px;
            }
            
            .card {
                aspect-ratio: 1.1 / 1; /* Fica ligeiramente mais quadrado no celular para economizar tela */
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <h1 class="main-title">Saúde na palma da mão</h1>
        
        <div class="cards-grid">
            
            <div class="card">
                <i class="fa-solid fa-apple-whole card-icon"></i>
                <span class="card-title">Nutrição</span>
            </div>

            <div class="card">
                <i class="fa-solid fa-moon card-icon"></i>
                <span class="card-title">Sono</span>
            </div>

            <div class="card">
                <i class="fa-solid fa-file-medical card-icon"></i>
                <span class="card-title">exames</span>
            </div>

        </div>

    </div>

</body>
</html>
