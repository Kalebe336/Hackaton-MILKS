<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPrev - Transcrição Simplificada</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/logo.png" alt="VitaPrev Logo">
            <h1>VitaPrev</h1>
        </div>
        <nav>
            <a href="/perfil">Perfil</a>
            <a href="/transcricao" class="active">Transcrever Exames</a>
            <a href="/nutricao">Nutrição</a>
            <a href="/sono">Sono</a>
            <a href="/api/sair" style="color: var(--alert-red);">Sair</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="card card-blue">
            <h2>Transcritor de Exames Inteligente</h2>
            <p style="margin-bottom: 1.5rem; color:#555;">Envie a foto do laudo laboratorial do seu exame e insira o valor encontrado para obter a tradução do seu estado de saúde de forma simples.</p>
            
            <form action="/api/transcrever" method="POST" enctype="multipart/form-data">
                <div class="grid-2" style="gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label>Qual categoria deseja analisar?</label>
                        <select name="tipoExame" required>
                            <option value="glicemia">Glicemia (Açúcar no Sangue)</option>
                            <option value="lipidio">Perfil Lipídico (Colesterol Total)</option>
                            <option value="hepatica">Função Hepática (TGP / Fígado)</option>
                            <option value="tireoide">Tireoide (TSH)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Valor numérico encontrado no exame</label>
                        <input type="number" step="0.01" name="valor" placeholder="Ex: 95.5" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Fazer upload do arquivo/foto do exame (Ficará salva no seu histórico)</label>
                    <input type="file" name="fotoExame" accept="image/*" required>
                </div>
                <button type="submit" style="background-color: var(--dark-green);">Transcrever e Analisar Agora</button>
            </form>
        </div>

        <div class="card">
            <h2>Histórico de Transcrições & Diagnósticos Simplificados</h2>
            <div id="historicoExames">
                </div>
        </div>
    </div>

    <script>
        fetch('/api/usuario-atual')
            .then(res => res.json())
            .then(user => {
                const container = document.getElementById('historicoExames');
                if(user.exames.length === 0) {
                    container.innerHTML = '<p style="color:#777;">Nenhum exame transcrito até o momento.</p>';
                    return;
                }
                user.exames.forEach(ex => {
                    let badgeClass = 'badge-moderado';
                    if(ex.classificacao.includes('Bom')) badgeClass = 'badge-bom';
                    if(ex.classificacao.includes('Baixo')) badgeClass = 'badge-baixo';

                    container.innerHTML += `
                        <div class="exame-item">
                            <div style="flex: 1; padding-right: 20px;">
                                <div style="display:flex; align-items:center; gap: 15px; margin-bottom: 8px;">
                                    <h3 style="color:var(--primary-blue);">${ex.tipo}</h3>
                                    <span class="badge ${badgeClass}">${ex.classificacao}</span>
                                </div>
                                <p style="font-size:1.1rem; margin-bottom: 5px;"><strong>Valor Informado:</strong> ${ex.valor}</p>
                                <p style="color:#555; background:#FFF; padding:10px; border-left:4px solid var(--medium-green); border-radius:4px;">${ex.mensagem}</p>
                                <small style="color:#888; display:block; margin-top:8px;">Analisado em: ${ex.data}</small>
                            </div>
                            ${ex.foto ? `<div><img src="${ex.foto}" class="exame-img" alt="Exame"></div>` : ''}
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
